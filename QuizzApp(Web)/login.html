<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Register Sliding Page</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container" id="container">

<!-- LOGIN MESSAGE LEFT -->

<div class="form login-left">
<h1>Welcome 👋</h1>
<p>Login to continue your journey</p>
<br>
<p>Dont have an account ?</p> 
<p class="toggle" onclick="showRegister()">Register here</p>
</div>


<!-- LOGIN FORM RIGHT -->

<div class="form login-right">

<h2>Login</h2>

<input type="text" placeholder="Username">
<input type="password" placeholder="Password">

<button onclick="validateLogic()">Login</button><br>
<br>

<p class="home" onclick="goToHome()">Back to home</p>
</div>

<!-- REGISTER FORM LEFT -->

<div class="form register-left">

<h2>Register</h2>

<input type="text" placeholder="Name">
<input type="text" placeholder="Mobile Number">
<input type="email" placeholder="Email">
<input type="password" placeholder="Set Password">

<button onclick="reg_validation()">Create Account</button>

<p class="toggle1" onclick="showLogin()">Back to Login</p>

</div>


<!-- REGISTER MESSAGE RIGHT -->

<div class="form register-right">

<h1>Welcome to Registration 🎉</h1>
<p>Create your account to get started</p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
